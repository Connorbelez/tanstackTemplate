name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      VITE_E2E: "true"
      WORKOS_CLIENT_ID: ${{ secrets.WORKOS_CLIENT_ID }}
      WORKOS_API_KEY: ${{ secrets.WORKOS_API_KEY }}
      WORKOS_COOKIE_PASSWORD: ${{ secrets.WORKOS_COOKIE_PASSWORD }}
      WORKOS_REDIRECT_URI: "http://127.0.0.1:3100/callback"
      VITE_WORKOS_CLIENT_ID: ${{ secrets.VITE_WORKOS_CLIENT_ID }}
      VITE_CONVEX_URL: ${{ secrets.VITE_CONVEX_URL }}
      CONVEX_DEPLOYMENT: ${{ secrets.CONVEX_DEPLOYMENT }}
      TEST_ACCOUNT_EMAIL: ${{ secrets.TEST_ACCOUNT_EMAIL }}
      TEST_ACCOUNT_PW: ${{ secrets.TEST_ACCOUNT_PW }}
      TEST_ADMIN_ORG: ${{ secrets.TEST_ADMIN_ORG }}
      TEST_MEMBER_ORG: ${{ secrets.TEST_MEMBER_ORG }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        run: bunx playwright install chromium --with-deps

      - name: Run E2E tests
        run: bun test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
